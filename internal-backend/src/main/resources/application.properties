spring.application.name=internal-backend
spring.config.import=optional:file:../.env[.properties]
server.port=${SERVER_PORT:8080}

# Supabase REST API Configuration
supabase.url=${NEXT_PUBLIC_SUPABASE_URL:${SUPABASE_URL:}}
supabase.anon.key=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
# Required for certification DB rows, CV metadata, and PostgREST retries when RLS returns 403.
supabase.service.role.key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:student-private-files}
# Must match Storage bucket id exactly; bucket should be Public so /object/public/... URLs in studentprofile.photo work.
supabase.storage.profile-bucket=${SUPABASE_STORAGE_PROFILE_BUCKET:user-profile-photo}
# Set true after running sql/alter-studentprofile-banner-cover.sql (adds banner_title + cover_url).
# Default true so banner headline saves; set SUPABASE_PROFILE_BANNER_COVER_COLUMNS=false if those columns are missing.
supabase.profile.banner-cover-columns=${SUPABASE_PROFILE_BANNER_COVER_COLUMNS:true}
app.file.encryption.key=${APP_FILE_ENCRYPTION_KEY:}
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

