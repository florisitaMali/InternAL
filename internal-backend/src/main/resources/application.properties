spring.application.name=internal-backend
spring.config.import=optional:file:../.env[.properties]
server.port=${SERVER_PORT:8080}

# Prefer NEXT_PUBLIC_* (same keys as frontend); optional SUPABASE_* override
supabase.url=${NEXT_PUBLIC_SUPABASE_URL:${SUPABASE_URL:}}
supabase.anon.key=${NEXT_PUBLIC_SUPABASE_ANON_KEY:${SUPABASE_ANON_KEY:}}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration