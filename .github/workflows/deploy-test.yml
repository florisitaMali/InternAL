name: Deploy to Test
on:
  push:
    branches: [develop]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: internal-frontend/package-lock.json

      - name: Install & Build Frontend
        run: |
          cd internal-frontend
          npm ci
          npm run build

      - name: Debug secrets
        run: |
          echo "Host length: ${#VPS_HOST}"
          echo "User length: ${#VPS_USER}"
          echo "Password length: ${#VPS_PASSWORD}"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      - name: Deploy to VPS (test)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/test-internalbania
            rm -rf internal-frontend/dist
            git pull origin develop
            cd internal-frontend
            npm ci
            npm run build
            cd ../internal-backend
            mvn package -DskipTests
            pm2 restart test-internalbania-backend
          
